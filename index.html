<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  :root {
    --amber: #35AEB3;
    --amber-bright: #5DE0E6;
    --amber-dim: #1A5759;
    --amber-glow: #35AEB355;
    --bg: #020a0a;
    --bg-panel: #041010;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--amber);
    font-family: 'Share Tech Mono', monospace;
    overflow-x: hidden;
  }

  /* CRT scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 999;
  }

  /* Flicker animation */
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.8; }
    94% { opacity: 1; }
    96% { opacity: 0.9; }
    97% { opacity: 1; }
  }

  .screen {
    animation: flicker 6s infinite;
    min-height: 100vh;
    padding: 40px;
    position: relative;
    z-index: 1;
  }

  /* Top bar */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid var(--amber-dim);
    padding: 8px 16px;
    margin-bottom: 32px;
    font-size: 13px;
    color: var(--amber-dim);
    letter-spacing: 2px;
  }

  .topbar .title {
    color: var(--amber-bright);
    font-size: 15px;
    text-shadow: 0 0 8px var(--amber-glow);
  }

  /* Main terminal */
  .terminal {
    max-width: 820px;
    margin: 0 auto;
  }

  .header-box {
    border: 2px solid var(--amber);
    display: inline-block;
    padding: 6px 20px;
    margin-bottom: 28px;
    font-size: 20px;
    letter-spacing: 6px;
    text-shadow: 0 0 12px var(--amber-glow);
    color: var(--amber-bright);
  }

  .line {
    font-size: 15px;
    line-height: 1.9;
    letter-spacing: 1.5px;
    white-space: pre-wrap;
    opacity: 0;
    color: var(--amber);
    padding-bottom: 2px;
  }

  .line.visible {
    opacity: 1;
  }

  .line .typed {
    display: inline;
  }

  /* Cursor */
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .cursor {
    display: inline-block;
    width: 10px;
    height: 17px;
    background: var(--amber-bright);
    vertical-align: text-bottom;
    animation: blink 0.7s step-end infinite;
    margin-left: 2px;
    box-shadow: 0 0 6px var(--amber-glow);
  }

  .section-label {
    color: var(--amber-bright);
    text-shadow: 0 0 10px var(--amber-glow);
    text-decoration: underline;
    text-underline-offset: 4px;
  }

  .key {
    color: var(--amber-dim);
  }

  .val {
    color: var(--amber-bright);
    text-shadow: 0 0 4px var(--amber-glow);
  }

  .bracket {
    color: var(--amber-dim);
  }

  .separator {
    color: var(--amber-dim);
  }

  .highlight {
    color: var(--amber-bright);
    text-shadow: 0 0 10px var(--amber-glow), 0 0 20px var(--amber-glow);
  }

  .question {
    color: #2CF5C8;
    text-shadow: 0 0 6px #2CF5C844;
  }

  /* Globe */
  .globe-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0 auto 28px;
    position: relative;
  }

  .globe-container canvas {
    display: block;
  }

  .globe-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--amber-dim);
    margin-top: 8px;
    text-align: center;
  }

  .globe-label .coords {
    color: var(--amber-bright);
    text-shadow: 0 0 6px var(--amber-glow);
  }

  /* Decorative bottom bar */
  .bottombar {
    margin-top: 48px;
    border-top: 1px solid var(--amber-dim);
    padding-top: 12px;
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--amber-dim);
    letter-spacing: 3px;
    opacity: 0;
    transition: opacity 0.5s;
  }

  .bottombar.visible {
    opacity: 1;
  }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--amber);
    border-radius: 50%;
    margin-right: 8px;
    box-shadow: 0 0 6px var(--amber-glow);
    animation: blink 2s step-end infinite;
  }

  /* Ambient background noise */
  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 998;
  }

  /* Terrain wireframe decoration */
  .terrain-deco {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 180px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.08;
  }

  @media (max-width: 600px) {
    .screen { padding: 20px 16px; }
    .line { font-size: 12px; letter-spacing: 0.5px; }
    .header-box { font-size: 14px; letter-spacing: 3px; }
    .topbar { font-size: 10px; flex-direction: column; gap: 4px; }
  }
</style>
</head>

    // South America (simplified)
    [[-80,10],[-77,8],[-72,12],[-67,11],[-60,8],[-55,5],[-51,0],[-50,-3],[-45,-5],[-40,-10],[-38,-15],[-39,-22],[-42,-23],[-48,-28],[-53,-33],[-58,-38],[-65,-40],[-68,-55],[-72,-52],[-75,-45],[-73,-40],[-72,-35],[-70,-30],[-70,-20],[-75,-15],[-77,-10],[-80,-3],[-80,3],[-77,5],[-80,10]],

  let rotation = -0.4; // Start with Europe roughly facing us

  function project(lat, lon, rot) {
    const x3 = Math.cos(lat) * Math.sin(lon + rot);
    const y3 = -Math.sin(lat);
    const z3 = Math.cos(lat) * Math.cos(lon + rot);
    return { x: cx + x3 * R, y: cy + y3 * R, z: z3 };
  }

  function drawGlobe() {
    ctx.clearRect(0, 0, W, H);

    // Outer circle glow
    ctx.beginPath();
    ctx.arc(cx, cy, R + 4, 0, Math.PI * 2);
    ctx.strokeStyle = AMBER_DIM;
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.strokeStyle = AMBER;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = AMBER_GLOW;
    ctx.shadowBlur = 10;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Latitude lines
    for (let lat = -75; lat <= 75; lat += 15) {
      const latR = lat * Math.PI / 180;
      ctx.beginPath();
      let started = false;
      for (let lon = 0; lon <= 360; lon += 3) {
        const lonR = lon * Math.PI / 180;
        const p = project(latR, lonR, rotation);
        if (p.z < 0) { started = false; continue; }
        if (!started) { ctx.moveTo(p.x, p.y); started = true; }
        else ctx.lineTo(p.x, p.y);
      }
      ctx.strokeStyle = lat === 0 ? AMBER_DIM : 'rgba(26,87,89,0.25)';
      ctx.lineWidth = lat === 0 ? 0.8 : 0.4;
      ctx.stroke();
    }

    // Longitude lines
    for (let lon = 0; lon < 360; lon += 20) {
      const lonR = lon * Math.PI / 180;
      ctx.beginPath();
      let started = false;
      for (let lat = -90; lat <= 90; lat += 3) {
        const latR = lat * Math.PI / 180;
        const p = project(latR, lonR, rotation);
        if (p.z < 0) { started = false; continue; }
        if (!started) { ctx.moveTo(p.x, p.y); started = true; }
        else ctx.lineTo(p.x, p.y);
      }
      ctx.strokeStyle = 'rgba(26,87,89,0.25)';
      ctx.lineWidth = 0.4;
      ctx.stroke();
    }

    // Continents
    for (const coast of continents) {
      ctx.beginPath();
      let started = false;
      for (const [lon, lat] of coast) {
        const latR = lat * Math.PI / 180;
        const lonR = lon * Math.PI / 180;
        const p = project(latR, lonR, rotation);
        if (p.z < 0) { started = false; continue; }
        if (!started) { ctx.moveTo(p.x, p.y); started = true; }
        else ctx.lineTo(p.x, p.y);
      }
      ctx.strokeStyle = AMBER;
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }

    // Copenhagen pin
    const cph = project(CPH_LAT, CPH_LON, rotation);
    if (cph.z > 0) {
      // Pin line
      ctx.beginPath();
      ctx.moveTo(cph.x, cph.y);
      ctx.lineTo(cph.x, cph.y - 28);
      ctx.strokeStyle = AMBER_BRIGHT;
      ctx.lineWidth = 1.5;
      ctx.shadowColor = AMBER_GLOW;
      ctx.shadowBlur = 8;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Pin dot
      ctx.beginPath();
      ctx.arc(cph.x, cph.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = AMBER_BRIGHT;
      ctx.shadowColor = AMBER_GLOW;
      ctx.shadowBlur = 14;
      ctx.fill();
      ctx.shadowBlur = 0;

      // Pulsing ring
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 300);
      ctx.beginPath();
      ctx.arc(cph.x, cph.y, 8 + pulse * 6, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(93,224,230,${0.4 - pulse * 0.3})`;
      ctx.lineWidth = 1;
      ctx.stroke();

      // Label
      ctx.font = '11px Share Tech Mono, monospace';
      ctx.fillStyle = AMBER_BRIGHT;
      ctx.shadowColor = AMBER_GLOW;
      ctx.shadowBlur = 6;
      ctx.fillText('CPH', cph.x + 8, cph.y - 30);
      ctx.shadowBlur = 0;

      // Crosshair
      const ch = 10;
      ctx.beginPath();
      ctx.moveTo(cph.x - ch, cph.y); ctx.lineTo(cph.x - 6, cph.y);
      ctx.moveTo(cph.x + 6, cph.y); ctx.lineTo(cph.x + ch, cph.y);
      ctx.moveTo(cph.x, cph.y - ch); ctx.lineTo(cph.x, cph.y - 6);
      ctx.moveTo(cph.x, cph.y + 6); ctx.lineTo(cph.x, cph.y + ch);
      ctx.strokeStyle = 'rgba(93,224,230,0.5)';
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }

    // Corner brackets decoration
    const b = 12;
    ctx.strokeStyle = AMBER_DIM;
    ctx.lineWidth = 1;
    // top-left
    ctx.beginPath(); ctx.moveTo(4, b+4); ctx.lineTo(4, 4); ctx.lineTo(b+4, 4); ctx.stroke();
    // top-right
    ctx.beginPath(); ctx.moveTo(W-b-4, 4); ctx.lineTo(W-4, 4); ctx.lineTo(W-4, b+4); ctx.stroke();
    // bottom-left
    ctx.beginPath(); ctx.moveTo(4, H-b-4); ctx.lineTo(4, H-4); ctx.lineTo(b+4, H-4); ctx.stroke();
    // bottom-right
    ctx.beginPath(); ctx.moveTo(W-b-4, H-4); ctx.lineTo(W-4, H-4); ctx.lineTo(W-4, H-b-4); ctx.stroke();

    rotation += 0.003;
    requestAnimationFrame(drawGlobe);
  }

  drawGlobe();
})();

  ]},
  { text: '' },
  { text: '┌──────────────────────────────────────────┐', cls: 'separator' },
  { text: '│  END TRANSMISSION                        │', cls: 'separator' },
  { text: '└──────────────────────────────────────────┘', cls: 'separator' },
];

const terminal = document.getElementById('terminal');
const bottombar = document.getElementById('bottombar');

let currentLine = 0;
let currentChar = 0;
let currentSpan = null;
let cursorEl = null;

function createCursor() {
  if (cursorEl) cursorEl.remove();
  cursorEl = document.createElement('span');
  cursorEl.className = 'cursor';
  return cursorEl;
}

function getPlainText(line) {
  if (line.markup) {
    return line.markup.map(m => m.text).join('');
  }
  return line.text;
}

function typeNextChar() {
  if (currentLine >= lines.length) {
    if (cursorEl) cursorEl.remove();
    bottombar.classList.add('visible');
    return;
  }

  const line = lines[currentLine];
  const plainText = getPlainText(line);

  // Create line element if at start
  if (currentChar === 0) {
    const lineEl = document.createElement('div');
    lineEl.className = 'line visible';
    lineEl.dataset.lineIndex = currentLine;
    terminal.appendChild(lineEl);
    currentSpan = lineEl;

    if (plainText === '') {
      lineEl.innerHTML = '&nbsp;';
      currentLine++;
      currentChar = 0;
      setTimeout(typeNextChar, 160); // breathe on blank lines
      return;
    }
  }

  const lineEl = terminal.querySelector(`[data-line-index="${currentLine}"]`);

  if (currentChar < plainText.length) {
    // Rebuild the line content up to currentChar+1
    const visibleText = plainText.substring(0, currentChar + 1);
    let html = '';

    if (line.markup) {
      let charCount = 0;
      for (const segment of line.markup) {
        const segStart = charCount;
        const segEnd = charCount + segment.text.length;
        if (segStart < visibleText.length) {
          const visiblePart = segment.text.substring(0, Math.min(segment.text.length, visibleText.length - segStart));
          html += `<span class="${segment.cls}">${escapeHtml(visiblePart)}</span>`;
        }
        charCount = segEnd;
      }
    } else if (line.cls) {
      html = `<span class="${line.cls}">${escapeHtml(visibleText)}</span>`;
    } else {
      html = escapeHtml(visibleText);
    }

    lineEl.innerHTML = html;
    lineEl.appendChild(createCursor());

    currentChar++;
    const justTyped = plainText[currentChar - 1];

    // Base char cadence — unchanged authentic CRT feel
    let delay;
    if (justTyped === ' ') delay = 18;
    else delay = Math.random() * 25 + 12;

    // Punctuation micro-holds — operator weighing what comes next
    if (justTyped === ',') delay += 140;
    else if (justTyped === ':') delay += 180;
    else if (justTyped === ']') delay += 220;
    else if (justTyped === '?') delay += 160;
    else if (justTyped === '.') delay += 120;

    setTimeout(typeNextChar, delay);
  } else {
    // Line complete — inter-line beat varies by line type
    if (cursorEl) cursorEl.remove();

    let interLineDelay = 180;
    if (line.cls === 'section-label') interLineDelay = 400;   // dramatic beat after header
    else if (line.cls === 'separator') interLineDelay = 280;  // settle after divider
    else if (line.cls === 'highlight') interLineDelay = 340;  // let callout land

    currentLine++;
    currentChar = 0;
    setTimeout(typeNextChar, interLineDelay);
  }
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Start after small delay
setTimeout(typeNextChar, 800);

// Add ambient audio-like hum via subtle CSS animation
document.body.style.setProperty('--hue-shift', '0deg');
let hue = 0;
setInterval(() => {
  hue = (hue + 0.2) % 5;
  document.body.style.filter = `hue-rotate(${hue - 2.5}deg)`;
}, 200);
</script>
</body>
</html>
